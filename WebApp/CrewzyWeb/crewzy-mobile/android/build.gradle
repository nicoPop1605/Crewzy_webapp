// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        // NOU: Adaugă linia asta aici
        kotlin_version = '1.9.0'
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.1' // (sau ce versiune aveai deja aici)

        // NOU: Adaugă linia asta aici pentru a descărca suportul de Kotlin
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"

        // Dacă aveai linia cu google-services, las-o la locul ei
        classpath 'com.google.gms:google-services:4.4.0'
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
